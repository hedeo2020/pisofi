services:
  api:
    build: .
    restart: unless-stopped
    environment:
      PORT: "3000"
      APP_MODE: simulation
      SIMULATION_WEBHOOK_SECRET: ${SIMULATION_WEBHOOK_SECRET:?set SIMULATION_WEBHOOK_SECRET}
    ports:
      - "127.0.0.1:3000:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/healthz').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pisonet}
      POSTGRES_USER: ${POSTGRES_USER:-pisonet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/001_initial.sql:/docker-entrypoint-initdb.d/001_initial.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  mqtt:
    image: eclipse-mosquitto:2.0
    restart: unless-stopped
    command: ["mosquitto", "-c", "/mosquitto-no-auth.conf"]
    expose:
      - "1883"

volumes:
  postgres_data:
